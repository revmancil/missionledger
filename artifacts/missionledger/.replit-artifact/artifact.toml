kind = "web"
previewPath = "/"
title = "MissionLedger"
version = "1.0.0"
id = "artifacts/missionledger"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21813
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/missionledger run dev"

[services.env]
PORT = "21813"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/missionledger", "run", "build"]
publicDir = "artifacts/missionledger/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

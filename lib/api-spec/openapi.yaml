            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reconciliation"
    post:
      operationId: createReconciliation
      tags: [reconciliation]
      summary: Create a reconciliation session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReconciliationRequest"
      responses:
        "201":
          description: Reconciliation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reconciliation"

  /reconciliation/{id}/items:
    get:
      operationId: getReconciliationItems
      tags: [reconciliation]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reconciliation items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReconciliationItem"
    put:
      operationId: updateReconciliationItems
      tags: [reconciliation]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                itemIds:
                  type: array
                  items:
                    type: string
                cleared:
                  type: boolean
              required: [itemIds, cleared]
      responses:
        "200":
          description: Updated

  /reconciliation/{id}/finish:
    post:
      operationId: finishReconciliation
      tags: [reconciliation]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reconciliation finished
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reconciliation"

